<!doctype html>
<html lang="en" class="no-js">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Apply Now | Windy Peaks Brewery &amp; Steakhouse</title>
  <meta name="description" content="Apply for a position at Windy Peaks Brewery & Steakhouse in Wheatland, Wyoming.">
  <meta name="theme-color" content="#231a10">
  <link rel="icon" type="image/png" href="assets/img/logo-icon-tight.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,600;1,9..144,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css">

  <link rel="stylesheet" href="assets/css/tokens.css">
  <link rel="stylesheet" href="assets/css/base.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <style>
    .field-section-title {
      font-family: var(--font-body);
      font-size: var(--fs-xs);
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--copper-dark);
      margin-bottom: var(--sp-4);
    }
    .section--dark .field-section-title { color: var(--copper-light); }
    .field-section + .field-section { margin-top: var(--sp-6); padding-top: var(--sp-6); border-top: 1px solid var(--border-on-dark); }
  </style>
</head>
<body data-page="apply">
  <a href="#main" class="skip-link">Skip to content</a>

  <main id="main">

    <section class="page-hero grain">
      <div class="page-hero__art" id="page-hero-art" aria-hidden="true"></div>
      <div class="page-hero__scrim"></div>
      <div class="container page-hero__inner">
        <p class="eyebrow" style="color:var(--copper-light);">Join Our Team</p>
        <h1 class="h-1" data-reveal>Apply Now</h1>
        <p class="lede" data-reveal id="apply-lede">Fill out the form below and we'll be in touch.</p>
      </div>
    </section>

    <section class="section section--dark grain" data-reveal-group>
      <div class="container container--narrow">
        <div class="card" data-reveal>
          <form data-static-form>

            <div class="field">
              <label for="a-position">Position you're applying for <span class="req">*</span></label>
              <select id="a-position" name="position" required>
                <option value="">Select a position</option>
                <option value="Server">Server</option>
                <option value="Hostess">Hostess</option>
                <option value="Cook / Prep">Cook / Prep</option>
                <option value="Dishwasher">Dishwasher</option>
                <option value="Bartender">Bartender</option>
                <option value="Restaurant Manager">Restaurant Manager</option>
                <option value="Other / Not Listed">Other / Not Listed</option>
              </select>
            </div>

            <div class="field-section" style="margin-top: var(--sp-6);">
              <p class="field-section-title">Personal Details</p>
              <div class="field-row field-row--2">
                <div class="field">
                  <label for="a-first">First name <span class="req">*</span></label>
                  <input id="a-first" name="firstName" type="text" autocomplete="given-name" required>
                </div>
                <div class="field">
                  <label for="a-last">Last name <span class="req">*</span></label>
                  <input id="a-last" name="lastName" type="text" autocomplete="family-name" required>
                </div>
              </div>
              <div class="field">
                <label for="a-email">Email address <span class="req">*</span></label>
                <input id="a-email" name="email" type="email" autocomplete="email" required>
              </div>
            </div>

            <div class="field-section">
              <p class="field-section-title">Contact Details</p>
              <div class="field">
                <label for="a-address">Address <span class="req">*</span></label>
                <input id="a-address" name="address" type="text" autocomplete="street-address" required>
              </div>
              <div class="field-row field-row--3">
                <div class="field">
                  <label for="a-city">City <span class="req">*</span></label>
                  <input id="a-city" name="city" type="text" autocomplete="address-level2" required>
                </div>
                <div class="field">
                  <label for="a-postal">Postal code <span class="req">*</span></label>
                  <input id="a-postal" name="postalCode" type="text" autocomplete="postal-code" required>
                </div>
                <div class="field">
                  <label for="a-country">Country <span class="req">*</span></label>
                  <input id="a-country" name="country" type="text" autocomplete="country-name" value="United States" required>
                </div>
              </div>
              <div class="field-row field-row--2">
                <div class="field">
                  <label for="a-tel">Telephone</label>
                  <input id="a-tel" name="telephone" type="tel" autocomplete="tel">
                </div>
                <div class="field">
                  <label for="a-cell">Cell phone <span class="req">*</span></label>
                  <input id="a-cell" name="cellPhone" type="tel" autocomplete="tel" required>
                </div>
              </div>
              <div class="field">
                <label for="a-qualifications">Qualifications <span class="req">*</span></label>
                <textarea id="a-qualifications" name="qualifications" placeholder="Relevant experience, certifications, skills..." required></textarea>
              </div>
              <div class="field">
                <label for="a-availability">Times available</label>
                <textarea id="a-availability" name="availability" placeholder="e.g. Thursday-Saturday evenings"></textarea>
              </div>
              <div class="field">
                <label for="a-resume">Upload your resume <span class="req">*</span></label>
                <input id="a-resume" name="resume" type="file" accept=".pdf,.doc,.docx" required>
                <p class="field-hint">PDF or Word document.</p>
              </div>
            </div>

            <button type="submit" class="btn btn--primary" style="width:100%; margin-top: var(--sp-6);">Submit Application</button>
            <p data-form-status role="status" aria-live="polite" class="field-hint" style="margin-top: var(--sp-2); text-align:center;"></p>
          </form>
          <div data-form-confirm hidden class="form-confirm">
            <div class="form-confirm__icon"><i class="ph ph-check" style="font-size:1.5rem;"></i></div>
            <h3 class="h-3">Thanks for applying</h3>
            <p class="text-dim" style="margin-top: var(--sp-2);">We'll be in touch. For questions in the meantime, email <a href="mailto:kristal@windypeaksbrewery.com" style="text-decoration:underline;">kristal@windypeaksbrewery.com</a>.</p>
          </div>
        </div>
      </div>
    </section>

  </main>

  <button type="button" class="back-to-top" aria-label="Back to top">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true"><path d="M8 13V3M3 7l5-5 5 5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </button>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <script src="assets/js/art.js"></script>
  <script src="assets/js/partials.js"></script>
  <script>
    document.getElementById("page-hero-art").innerHTML = WPArt.dining();

    const POSITION_LABELS = {
      "server": "Server",
      "hostess": "Hostess",
      "cook-prep": "Cook / Prep",
      "dishwasher": "Dishwasher",
      "bartender": "Bartender",
      "manager": "Restaurant Manager",
    };
    const slug = new URLSearchParams(window.location.search).get("position");
    const label = POSITION_LABELS[slug];
    if (label) {
      document.getElementById("a-position").value = label;
      document.getElementById("apply-lede").textContent = `You're applying for: ${label}. Fill out the form below and we'll be in touch.`;
    }
  </script>
  <script src="assets/js/main.js"></script>
</body>
</html>
