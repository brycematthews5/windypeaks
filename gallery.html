<!doctype html>
<html lang="en" class="no-js">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Gallery | Windy Peaks Brewery &amp; Steakhouse</title>
  <meta name="description" content="A look inside Windy Peaks Brewery & Steakhouse — the brewhouse, the dining room, the plates and pours. Wheatland, Wyoming.">
  <meta name="theme-color" content="#231a10">
  <link rel="icon" type="image/png" href="assets/img/logo-icon-tight.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,600;1,9..144,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css">

  <link rel="stylesheet" href="assets/css/tokens.css">
  <link rel="stylesheet" href="assets/css/base.css">
  <link rel="stylesheet" href="assets/css/components.css">
</head>
<body data-page="gallery">
  <a href="#main" class="skip-link">Skip to content</a>

  <main id="main">

    <section class="page-hero grain">
      <div class="page-hero__art" id="page-hero-art" aria-hidden="true"></div>
      <div class="page-hero__scrim"></div>
      <div class="container page-hero__inner">
        <p class="eyebrow" style="color:var(--copper-light);">A Look Inside</p>
        <h1 class="h-1" data-reveal>Gallery</h1>
        <p class="lede" data-reveal>The brewhouse, the grill, and the dining room &mdash; a preview of what's waiting for you at Windy Peaks. <em>(Real photography coming soon &mdash; these are placeholder illustrations.)</em></p>
      </div>
    </section>

    <section class="section">
      <div class="container">
        <div class="gallery-grid">
          <figure data-lightbox><img src="assets/img/bar.jpg" alt="The Windy Peaks bar and tap wall"><figcaption>The Dining Room</figcaption></figure>
          <figure data-lightbox><div class="g-art" data-scene="steak"></div><figcaption>Fresh Off the Grill</figcaption></figure>
          <figure data-lightbox><img src="assets/img/wpglass.jpg" alt="Windy Peaks beer poured tableside"><figcaption>Poured to Order</figcaption></figure>
          <figure data-lightbox><div class="g-art" data-scene="tanks"></div><figcaption>The Brewhouse</figcaption></figure>
          <figure data-lightbox><div class="g-art" data-scene="mountains"></div><figcaption>Wheatland at Dusk</figcaption></figure>
          <figure data-lightbox><div class="g-art" data-scene="steak"></div><figcaption>Hand-Cut, Grilled Fresh</figcaption></figure>
          <figure data-lightbox><div class="g-art" data-scene="dining"></div><figcaption>Friday Night</figcaption></figure>
          <figure data-lightbox><img src="assets/img/ontap.jpg" alt="Two Windy Peaks branded beers on tap"><figcaption>On Tap</figcaption></figure>
          <figure data-lightbox><div class="g-art" data-scene="wheat"></div><figcaption>Local Grain</figcaption></figure>
        </div>
      </div>
    </section>

    <section class="section section--dark grain" data-reveal-group>
      <div class="container" style="text-align:center;">
        <h2 class="h-2" data-reveal>See it in person</h2>
        <div class="cluster" style="justify-content:center; margin-top: var(--sp-5);" data-reveal>
          <a href="reservations.html" class="btn btn--primary">Reserve a Table</a>
          <a href="contact.html" class="btn btn--ghost" style="--btn-fg: var(--cream); border-color: var(--border-on-dark);">Get Directions</a>
        </div>
      </div>
    </section>

  </main>

  <button type="button" class="back-to-top" aria-label="Back to top">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true"><path d="M8 13V3M3 7l5-5 5 5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </button>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <script src="assets/js/art.js"></script>
  <script src="assets/js/partials.js"></script>
  <script>
    document.getElementById("page-hero-art").innerHTML = WPArt.wheat();
    document.querySelectorAll(".g-art").forEach((el) => {
      const scene = el.dataset.scene;
      if (typeof WPArt[scene] === "function") el.innerHTML = WPArt[scene]();
    });
  </script>
  <script src="assets/js/main.js"></script>
</body>
</html>
