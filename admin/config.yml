backend:
  name: git-gateway
  branch: main

site_url: https://windypeaks.netlify.app
display_url: https://windypeaks.netlify.app

media_folder: "assets/img/beers"
public_folder: "/assets/img/beers"

collections:
  - name: "beers"
    label: "Beers on Tap"
    label_singular: "Beer"
    folder: "content/beers"
    create: true
    delete: true
    slug: "{{slug}}"
    format: "json"
    extension: "json"
    summary: "{{name}} — {{category}}"
    fields:
      - label: "Beer Info"
        name: "beerInfo"
        widget: "catalog-beer-search"
        required: false
        hint: "Search catalog.beer above, click a result to fill in the fields below — or just type them in directly if it's not in their database."
      - { label: "Location", name: "location", widget: "string", hint: "e.g. Sheridan, WY — catalog.beer doesn't provide this, fill it in yourself." }
      - label: "Category"
        name: "category"
        widget: "select"
        hint: "Which section of the tap list this shows up under on the site."
        options:
          - "Pilsners & Pale Lagers"
          - "Blonde & Pale Ales"
          - "IPAs"
          - "Amber, Red & Brown Ales"
          - "Porters & Stouts"
          - "Sour & Fruit Beers"
      - { label: "Served on Nitro", name: "nitro", widget: "boolean", default: false, required: false }
      - { label: "Currently On Tap", name: "onTap", widget: "boolean", default: true, hint: "Turn off when this beer kicks — keeps it saved for next time instead of deleting it." }
      - { label: "Sort Order", name: "order", widget: "number", default: 10, hint: "Lower numbers show first within the same category." }

  - name: "food"
    label: "Food Menu"
    label_singular: "Food Item"
    folder: "content/food"
    create: true
    delete: true
    slug: "{{slug}}"
    format: "json"
    extension: "json"
    summary: "{{name}} — {{category}}"
    fields:
      - { label: "Item Name", name: "name", widget: "string" }
      - label: "Category"
        name: "category"
        widget: "select"
        options:
          - "Appetizers"
          - "Entrees"
          - "Salads"
          - "Sandwiches"
          - "Desserts"
          - "Kids"
      - { label: "Price", name: "price", widget: "string", hint: "e.g. $15 or $18 / $34 for half/full options" }
      - { label: "Description", name: "description", widget: "text", required: false, hint: "Leave blank for simple items like desserts." }
      - { label: "Contains Raw/Undercooked Risk", name: "undercookedRisk", widget: "boolean", default: false, hint: "Adds the * disclaimer marker (steaks, burgers, etc.)" }
      - { label: "Sort Order", name: "order", widget: "number", default: 10, hint: "Lower numbers show first within the same category." }

  - name: "wines"
    label: "Wine List"
    label_singular: "Wine"
    folder: "content/wines"
    create: true
    delete: true
    slug: "{{slug}}"
    format: "json"
    extension: "json"
    summary: "{{name}} — {{varietal}} ({{type}})"
    fields:
      - { label: "Name", name: "name", widget: "string" }
      - label: "Type"
        name: "type"
        widget: "select"
        options: ["Red", "White"]
      - { label: "Varietal", name: "varietal", widget: "string", hint: "e.g. Cabernet Sauvignon, Chardonnay" }
      - { label: "Price", name: "price", widget: "string", hint: "e.g. $9.50" }
      - { label: "Sort Order", name: "order", widget: "number", default: 10, hint: "Lower numbers show first within Red or White." }
